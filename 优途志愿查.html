<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>优途志愿查 · 高考志愿一键查</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    padding: 20px;
    color: #333;
  }
  .container {
    max-width: 960px;
    margin: 0 auto;
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    overflow: hidden;
  }
  header {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: #fff;
    padding: 32px 28px;
    text-align: center;
  }
  header h1 { font-size: 28px; margin-bottom: 8px; letter-spacing: 2px; }
  header p { opacity: 0.85; font-size: 14px; }
  .tabs { display: flex; border-bottom: 1px solid #eee; background: #fafafa; }
  .tab {
    flex: 1; padding: 18px; text-align: center; cursor: pointer;
    font-size: 15px; font-weight: 500; color: #666;
    border-bottom: 3px solid transparent; transition: all 0.2s;
  }
  .tab:hover { color: #667eea; }
  .tab.active {
    color: #667eea; background: #fff;
    border-bottom-color: #667eea; font-weight: 700;
  }
  .content { padding: 28px; min-height: 400px; }
  .panel { display: none; }
  .panel.active { display: block; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from {opacity:0; transform: translateY(8px);} to {opacity:1; transform: translateY(0);} }

  .filter-bar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
  .filter-bar input, .filter-bar select {
    padding: 10px 14px; border: 1px solid #e0e0e0;
    border-radius: 8px; font-size: 14px; outline: none;
    transition: border 0.2s; background: #fff;
  }
  .filter-bar input { flex: 1; min-width: 200px; }
  .filter-bar input:focus, .filter-bar select:focus { border-color: #667eea; }

  .college-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
  }
  .college-card {
    background: #f8f9fc; border-radius: 12px; padding: 18px;
    border-left: 4px solid #667eea;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .college-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 24px rgba(102,126,234,0.18);
  }
  .college-card h3 { font-size: 18px; margin-bottom: 10px; color: #333; }
  .college-meta { font-size: 13px; color: #666; margin-bottom: 8px; }
  .college-meta .label { color: #999; }
  .tag-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
  .tag {
    font-size: 12px; padding: 3px 10px; border-radius: 12px;
    background: #e8eaf6; color: #5c6bc0;
  }

  .major-list {
    margin-bottom: 24px;
  }
  .major-group { margin-bottom: 22px; }
  .major-group:last-child { margin-bottom: 0; }
  .major-group-title {
    font-size: 15px; font-weight: 600; color: #667eea;
    padding: 6px 0 10px; margin-bottom: 10px;
    border-bottom: 1px dashed #d5d9f0;
    display: flex; align-items: center; gap: 8px;
  }
  .major-group-count {
    display: inline-block;
    background: #eef0ff; color: #667eea;
    font-size: 12px; font-weight: 500;
    padding: 1px 8px; border-radius: 10px;
  }
  .major-group-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 10px;
  }
  .major-btn {
    padding: 14px; background: #f8f9fc;
    border: 2px solid transparent; border-radius: 10px;
    cursor: pointer; font-size: 15px;
    transition: all 0.2s; text-align: center;
  }
  .major-btn:hover { background: #e8eaf6; border-color: #667eea; }
  .major-btn.active {
    background: #667eea; color: #fff;
    border-color: #667eea;
    box-shadow: 0 6px 16px rgba(102,126,234,0.35);
  }

  .major-detail {
    background: #f8f9fc; border-radius: 12px; padding: 22px;
    border-top: 4px solid #667eea;
    animation: fadeIn 0.3s ease;
  }
  .major-detail h3 { font-size: 22px; margin-bottom: 16px; color: #333; }
  .detail-row {
    margin-bottom: 14px; padding: 12px 14px;
    background: #fff; border-radius: 8px;
    border-left: 3px solid #ddd;
  }
  .detail-row.course { border-left-color: #42a5f5; }
  .detail-row.advantage { border-left-color: #66bb6a; }
  .detail-row.disadvantage { border-left-color: #ef5350; }
  .detail-row.job { border-left-color: #ffa726; }
  .detail-label {
    font-size: 13px; font-weight: 600;
    color: #666; margin-bottom: 6px;
  }
  .detail-text { font-size: 14px; line-height: 1.7; color: #444; }

  .empty {
    text-align: center; padding: 40px 20px;
    color: #999; font-size: 14px;
  }
  footer {
    text-align: center; padding: 16px;
    font-size: 12px; color: #999; background: #fafafa;
  }
  /* ============ 强校推荐（专业面板） ============ */
  .top-colleges {
    margin-top: 20px;
    padding: 16px 18px;
    background: linear-gradient(135deg, #f5f7ff 0%, #fdf4ff 100%);
    border-radius: 10px;
    border-left: 4px solid #764ba2;
  }
  .top-colleges-title {
    font-size: 15px; font-weight: 600;
    color: #764ba2; margin-bottom: 12px;
    display: flex; align-items: center; gap: 6px;
  }
  .top-college-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 10px;
  }
  .top-college-item {
    background: #fff; padding: 10px 12px;
    border-radius: 8px; font-size: 13px;
    border: 1px solid #e8dcf0;
    transition: all 0.2s;
  }
  .top-college-item:hover {
    border-color: #764ba2;
    transform: translateY(-2px);
    box-shadow: 0 6px 14px rgba(118,75,162,0.15);
  }
  .top-college-item .name {
    font-weight: 600; color: #333;
    margin-bottom: 4px;
  }
  .top-college-item .meta {
    font-size: 11px; color: #999;
    display: flex; justify-content: space-between;
  }
  .top-college-item .level-tag {
    color: #764ba2; font-weight: 500;
  }
  .top-college-item .rank-tag {
    background: #f5f0fa; color: #764ba2;
    padding: 1px 6px; border-radius: 8px;
    font-weight: 500;
  }
  .top-colleges-empty {
    font-size: 13px; color: #999; padding: 8px 0;
  }

  /* ============ 分数推荐 tab ============ */
  .score-input-panel {
    background: #f8f9fc; border-radius: 12px;
    padding: 24px; margin-bottom: 20px;
    border-top: 4px solid #667eea;
  }
  .score-input-title {
    font-size: 17px; font-weight: 600;
    color: #333; margin-bottom: 16px;
  }
  .score-input-row {
    display: flex; gap: 12px; align-items: center;
    flex-wrap: wrap; margin-bottom: 12px;
  }
  .score-input-row label {
    font-size: 14px; color: #555; min-width: 80px;
  }
  .score-input-row input[type=number] {
    padding: 10px 14px; border: 1px solid #ddd;
    border-radius: 8px; font-size: 14px;
    width: 140px; outline: none;
  }
  .score-input-row input[type=number]:focus { border-color: #667eea; }
  .score-input-row select {
    padding: 10px 14px; border: 1px solid #ddd;
    border-radius: 8px; font-size: 14px;
    background: #fff; outline: none;
  }
  .btn-recommend {
    padding: 10px 24px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: #fff; border: none; border-radius: 8px;
    font-size: 14px; font-weight: 600; cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .btn-recommend:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 20px rgba(102,126,234,0.35);
  }
  .score-tip {
    font-size: 12px; color: #888;
    margin-top: 8px; line-height: 1.6;
  }

  .recommend-group {
    background: #fff; border-radius: 12px;
    padding: 20px; margin-bottom: 16px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.05);
  }
  .recommend-group.chong { border-left: 5px solid #ef5350; }
  .recommend-group.wen { border-left: 5px solid #66bb6a; }
  .recommend-group.bao { border-left: 5px solid #42a5f5; }
  .recommend-group-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px;
  }
  .recommend-group-title {
    font-size: 17px; font-weight: 700;
    display: flex; align-items: center; gap: 8px;
  }
  .recommend-group.chong .recommend-group-title { color: #d84545; }
  .recommend-group.wen .recommend-group-title { color: #46a04a; }
  .recommend-group.bao .recommend-group-title { color: #2e88d4; }
  .recommend-group-desc {
    font-size: 12px; color: #999;
  }
  .recommend-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 12px;
  }
  .recommend-card {
    background: #f8f9fc; padding: 12px 14px;
    border-radius: 8px; border: 1px solid #eee;
    transition: all 0.2s; cursor: pointer; position: relative;
  }
  .recommend-card:hover {
    background: #fff; box-shadow: 0 6px 16px rgba(0,0,0,0.08);
    transform: translateY(-2px); border-color: #d5dbff;
  }
  .recommend-card::after {
    content: "查看详情 →";
    position: absolute; right: 12px; bottom: 10px;
    font-size: 11px; color: #667eea; opacity: 0;
    transition: opacity .2s;
  }
  .recommend-card:hover::after { opacity: 1; }
  .recommend-card .rc-name {
    font-size: 15px; font-weight: 600;
    color: #333; margin-bottom: 4px;
  }
  .recommend-card .rc-meta {
    font-size: 12px; color: #666; margin-bottom: 6px;
  }
  .recommend-card .rc-tags {
    display: flex; flex-wrap: wrap; gap: 4px;
  }
  .recommend-card .rc-tag {
    font-size: 11px; padding: 2px 8px;
    background: #eef0ff; color: #5c6bc0;
    border-radius: 8px;
  }

  /* ============ 院校详情弹层 ============ */
  .college-card { cursor: pointer; position: relative; }
  .college-card::after {
    content: "点击查看详情 →";
    position: absolute; right: 14px; bottom: 12px;
    font-size: 12px; color: #667eea; opacity: 0;
    transition: opacity .2s;
  }
  .college-card:hover::after { opacity: 1; }

  .modal-mask {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(30, 34, 60, .55);
    display: none; align-items: center; justify-content: center;
    z-index: 999; padding: 20px;
    backdrop-filter: blur(3px);
  }
  .modal-mask.show { display: flex; }
  .modal-dialog {
    background: #fff; border-radius: 16px;
    width: 100%; max-width: 720px;
    max-height: 88vh; overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,.3);
    animation: modalIn .25s ease-out;
  }
  @keyframes modalIn {
    from { opacity: 0; transform: translateY(20px) scale(.96); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .modal-header {
    padding: 22px 26px 16px; border-bottom: 1px solid #eef1f6;
    display: flex; justify-content: space-between; align-items: flex-start;
    position: sticky; top: 0; background: #fff; z-index: 2;
    border-radius: 16px 16px 0 0;
  }
  .modal-header h2 {
    font-size: 22px; color: #2c3e50; margin: 0 0 6px;
  }
  .modal-header .sub {
    font-size: 13px; color: #7a869a;
  }
  .modal-header .sub .level-badge {
    display: inline-block; padding: 2px 10px; border-radius: 10px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: #fff; font-size: 12px; margin-left: 8px;
    font-weight: 600;
  }
  .modal-close {
    background: #f4f6fa; border: none; border-radius: 50%;
    width: 34px; height: 34px; font-size: 20px; cursor: pointer;
    color: #666; transition: all .2s; flex-shrink: 0;
    line-height: 34px; padding: 0;
  }
  .modal-close:hover { background: #e74c3c; color: #fff; }
  .modal-body { padding: 20px 26px 26px; }

  .info-block { margin-bottom: 22px; }
  .info-block-title {
    font-size: 15px; font-weight: 600; color: #333;
    padding: 8px 12px; background: #f8f9fc;
    border-left: 4px solid #667eea; border-radius: 4px;
    margin-bottom: 12px;
  }
  .info-block-title.score { border-left-color: #f39c12; background: #fff8ec; }
  .info-block-title.strong { border-left-color: #27ae60; background: #edfaf1; }
  .info-block-title.lib { border-left-color: #9b59b6; background: #f6f0fa; }
  .info-block-tip {
    font-size: 12px; color: #999; margin-left: 8px; font-weight: 400;
  }

  .score-est-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
  }
  .score-est-card {
    padding: 16px; border-radius: 10px;
    background: linear-gradient(135deg, #fff3d6 0%, #ffe0a3 100%);
    text-align: center;
  }
  .score-est-card.arts {
    background: linear-gradient(135deg, #ffe0e6 0%, #ffb8c8 100%);
  }
  .score-est-card .label {
    font-size: 13px; color: #7a5a1a; margin-bottom: 6px; font-weight: 600;
  }
  .score-est-card.arts .label { color: #a44a5a; }
  .score-est-card .value {
    font-size: 30px; font-weight: 800; color: #b8730f;
    letter-spacing: -1px;
  }
  .score-est-card.arts .value { color: #c53a5b; }
  .score-est-card .suffix {
    font-size: 14px; color: #7a5a1a; margin-left: 4px;
  }
  .score-est-card.arts .suffix { color: #a44a5a; }
  .score-est-card .rank-info {
    font-size: 12px; color: #666; margin-top: 6px;
  }

  .strong-major-list {
    display: flex; flex-wrap: wrap; gap: 8px;
  }
  .strong-major-item {
    padding: 8px 14px; border-radius: 20px;
    background: linear-gradient(135deg, #d4f5e3, #a6e6c1);
    color: #1e6b3f; font-size: 13px; font-weight: 600;
    cursor: pointer; transition: all .2s;
    border: 1px solid transparent;
  }
  .strong-major-item:hover {
    background: linear-gradient(135deg, #a6e6c1, #66d996);
    border-color: #27ae60;
  }
  .strong-major-item.peak {
    background: linear-gradient(135deg, #ffd97a, #ffb830);
    color: #7a4a00;
  }
  .strong-major-item.peak:hover {
    background: linear-gradient(135deg, #ffb830, #ff9500);
  }
  .strong-major-item .badge {
    display: inline-block; padding: 1px 6px; border-radius: 8px;
    font-size: 10px; background: rgba(255,255,255,.6);
    margin-left: 4px; vertical-align: middle;
  }
  .strong-major-empty {
    padding: 14px; text-align: center; color: #999; font-size: 13px;
    background: #fafbfc; border-radius: 8px;
  }
  .lib-tags {
    display: flex; flex-wrap: wrap; gap: 8px;
  }
  .lib-tag {
    padding: 6px 12px; border-radius: 6px;
    background: #f0eaf7; color: #6a3d99;
    font-size: 12px; font-weight: 500;
  }

  @media (max-width: 600px) {
    body { padding: 10px; }
    header h1 { font-size: 22px; }
    .tab { padding: 14px 8px; font-size: 13px; }
    .content { padding: 18px; }
    .modal-dialog { max-height: 92vh; }
    .modal-header, .modal-body { padding-left: 18px; padding-right: 18px; }
    .score-est-grid { grid-template-columns: 1fr; }
    .score-est-card .value { font-size: 26px; }
  }
</style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🎓 优途志愿查</h1>
      <p>高考本科院校 &amp; 专业一键查询工具</p>
    </header>

    <nav class="tabs">
      <div class="tab active" data-tab="college">📚 院校查询</div>
      <div class="tab" data-tab="arts">📖 文科专业</div>
      <div class="tab" data-tab="science">🔬 理科专业</div>
      <div class="tab" data-tab="art">🎨 艺术专业</div>
      <div class="tab" data-tab="score">📊 分数推荐</div>
    </nav>

    <main class="content">
      <section class="panel active" id="panel-college">
        <div class="filter-bar">
          <input type="text" id="college-search" placeholder="🔍 搜索院校名称或所在地...">
          <select id="province-filter">
            <option value="">所有省份</option>
          </select>
        </div>
        <div class="college-grid" id="college-grid"></div>
      </section>

      <section class="panel" id="panel-arts">
        <div class="filter-bar">
          <input type="text" id="arts-search" placeholder="🔍 搜索文科专业（支持模糊匹配，如「汉语」）...">
        </div>
        <div class="major-list" id="arts-list"></div>
        <div id="arts-detail"></div>
      </section>

      <section class="panel" id="panel-science">
        <div class="filter-bar">
          <input type="text" id="science-search" placeholder="🔍 搜索理科专业（支持模糊匹配，如「计算机」）...">
        </div>
        <div class="major-list" id="science-list"></div>
        <div id="science-detail"></div>
      </section>

      <section class="panel" id="panel-art">
        <div class="filter-bar">
          <input type="text" id="art-search" placeholder="🔍 搜索艺术专业（支持模糊匹配，如「播音」「设计」「舞蹈」）...">
        </div>
        <div class="major-list" id="art-list"></div>
        <div id="art-detail"></div>
      </section>

      <section class="panel" id="panel-score">
        <div class="score-input-panel">
          <div class="score-input-title">🎯 输入分数或位次，一键推荐冲/稳/保院校</div>
          <div class="score-input-row">
            <label>输入方式：</label>
            <select id="score-mode">
              <option value="score">按高考分数</option>
              <option value="rank">按全省位次</option>
            </select>
          </div>
          <div class="score-input-row" id="row-score">
            <label>高考分数：</label>
            <input type="number" id="score-input" placeholder="如 620" min="150" max="750">
            <select id="score-subject">
              <option value="science">理科/物理组</option>
              <option value="arts">文科/历史组</option>
              <option value="art_ms">艺术类·美术（综合分）</option>
              <option value="art_music">艺术类·音乐（综合分）</option>
              <option value="art_bd">艺术类·编导/播音（综合分）</option>
              <option value="art_culture">艺术类·仅文化课分</option>
            </select>
          </div>
          <div class="score-input-row" id="row-rank" style="display:none;">
            <label>全省位次：</label>
            <input type="number" id="rank-input" placeholder="如 8000" min="1" max="500000">
          </div>
          <div class="score-input-row">
            <label>优先省份：</label>
            <select id="pref-prov">
              <option value="">不限（全国）</option>
            </select>
            <button class="btn-recommend" id="btn-recommend">推荐院校</button>
          </div>
          <div class="score-tip">
            💡 位次数据基于全国综合估算（参照大省理工口径），实际录取受当年招生计划、省份、专业组影响。仅供筛选参考，最终以当年官方分数线为准。<br>
            🎨 <b>艺术生说明</b>：综合分按 <b>文化课×0.5 + 专业课×2.5×0.5（满分 750）</b> 主流口径估算；若你只有文化课分数，可选「仅文化课分」；艺术类结果会自动优先推荐艺术院校 + 艺术专业强校。
          </div>
        </div>
        <div id="recommend-result"></div>
      </section>
    </main>

    <footer>© 2026 优途志愿查 · 当前为示例数据，后续可扩展至 800+ 专业库</footer>
  </div>

  <!-- 院校详情弹层 -->
  <div class="modal-mask" id="college-modal" onclick="if(event.target===this)closeCollegeModal()">
    <div class="modal-dialog" id="college-modal-dialog"></div>
  </div>

<script>
const collegeDB = [
  // ============ 北京（26所211，含8所985）============
  {name:"清华大学", prov:"北京", level:"985/211/C9/双一流", majorLib:["理工顶尖","计算机/建筑/电子","经管强"]},

function renderColleges() {
  const search = document.getElementById('college-search').value.trim().toLowerCase();
  const province = document.getElementById('province-filter').value;
  const grid = document.getElementById('college-grid');

  const filtered = collegeDB.filter(c => {
    const matchSearch = !search || c.name.toLowerCase().includes(search) || c.prov.toLowerCase().includes(search);
    const matchProv = !province || c.prov === province;
    return matchSearch && matchProv;
  });

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty" style="grid-column:1/-1;">😢 暂无符合条件的院校</div>';
    return;
  }

  grid.innerHTML = filtered.map(c => `
    <div class="college-card" data-name="${c.name}">
      <h3>${c.name}</h3>
      <div class="college-meta"><span class="label">所在地：</span>${c.prov}</div>
      <div class="college-meta"><span class="label">层次：</span>${c.level}</div>
      <div class="tag-row">
        ${c.majorLib.map(m => `<span class="tag">${m}</span>`).join('')}
      </div>
    </div>
  `).join('');
}

const provinces = [...new Set(collegeDB.map(c => c.prov))];
const provSelect = document.getElementById('province-filter');
provinces.forEach(p => {
  const opt = document.createElement('option');
  opt.value = p; opt.textContent = p;
  provSelect.appendChild(opt);
});

document.getElementById('college-search').addEventListener('input', renderColleges);

function setupMajorPanel(dataObj, listId, detailId, searchId) {
  const listEl = document.getElementById(listId);
  const detailEl = document.getElementById(detailId);
  const searchEl = document.getElementById(searchId);
  let selectedName = null;

  function renderList() {
    const q = searchEl.value.trim().toLowerCase();
    const names = Object.keys(dataObj).filter(n => !q || n.toLowerCase().includes(q));

    if (names.length === 0) {
      listEl.innerHTML = '<div class="empty">😢 暂无匹配专业，换个关键词试试</div>';
      detailEl.innerHTML = '';
      return;
    }

    // 按 category 分组
    const groups = {};
    const order = [];
    names.forEach(n => {
      const cat = dataObj[n].category || '其他';
      if (!groups[cat]) { groups[cat] = []; order.push(cat); }
      groups[cat].push(n);
    });

    listEl.innerHTML = order.map(cat => `
      <div class="major-group">
        <div class="major-group-title">${cat} <span class="major-group-count">${groups[cat].length}</span></div>
        <div class="major-group-grid">
          ${groups[cat].map(n => `
            <div class="major-btn ${n===selectedName?'active':''}" data-name="${n}">${n}</div>
          `).join('')}
        </div>
      </div>
    `).join('');

    listEl.querySelectorAll('.major-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        selectedName = btn.dataset.name;
        renderList();
        renderDetail();
      });
    });
  }

  function renderDetail() {
    if (!selectedName || !dataObj[selectedName]) {
      detailEl.innerHTML = '';
      return;
    }
    const info = dataObj[selectedName];
    detailEl.innerHTML = `
      <div class="major-detail">
        <h3>📌 ${selectedName}</h3>
        <div class="detail-row course">
          <div class="detail-label">📘 核心课程</div>
          <div class="detail-text">${info.course}</div>
        </div>
        <div class="detail-row advantage">
          <div class="detail-label">✅ 专业优势</div>
          <div class="detail-text">${info.advantage}</div>
        </div>
        <div class="detail-row disadvantage">
          <div class="detail-label">❌ 专业劣势</div>
          <div class="detail-text">${info.disadvantage}</div>
        </div>
        <div class="detail-row job">
          <div class="detail-label">💼 就业方向</div>
          <div class="detail-text">${info.job}</div>
        </div>
        ${renderTopCollegesHTML(selectedName)}
      </div>
    `;
  }

  searchEl.addEventListener('input', renderList);
  renderList();
}

// ============ 反向匹配：某专业的强校 Top N ============
function matchCollegesByMajor(majorName) {
  const keywords = majorKeywords[majorName] || [majorName];
  const scored = [];
  collegeDB.forEach(c => {
    let score = 0;
    c.majorLib.forEach(lib => {
      keywords.forEach(kw => {
        if (lib.indexOf(kw) !== -1) {
          // 命中带"顶尖/A+/王牌/最全"等字眼加权
          const isPeak = /顶尖|A\+|王牌|最全/.test(lib);
          score += isPeak ? 4 : 1;
        }
      });
    });
    if (score > 0) {
      const rank = collegeRankMap[c.name] || 99999;
      const levelWeight = c.level.indexOf("C9") !== -1 ? 200
        : c.level.indexOf("985") !== -1 ? 80
        : c.level.indexOf("211") !== -1 ? 20 : 0;
      // 综合排序：匹配分越高越靠前；同分按院校层次+位次排
      const sortKey = -score * 1000 - levelWeight + (rank / 1000);
      scored.push({...c, matchScore: score, rank, sortKey});
    }
  });
  scored.sort((a, b) => a.sortKey - b.sortKey);
  return scored.slice(0, 12);
}

function renderTopCollegesHTML(majorName) {
  const list = matchCollegesByMajor(majorName);
  if (list.length === 0) {
    return `<div class="top-colleges">
      <div class="top-colleges-title">🏆 该专业对口强校</div>
      <div class="top-colleges-empty">😢 暂未收录该专业的对口强校，可切换到「院校查询」查看全部院校</div>
    </div>`;
  }
  return `<div class="top-colleges">
    <div class="top-colleges-title">🏆 该专业对口强校（按学科匹配 + 院校层次排序，Top ${list.length}）</div>
    <div class="top-college-grid">
      ${list.map(c => {
        const levelShort = c.level.indexOf("C9") !== -1 ? "C9·985"
          : c.level.indexOf("985") !== -1 ? "985"
          : c.level.indexOf("211") !== -1 ? "211"
          : "本科";
        return `<div class="top-college-item">
          <div class="name">${c.name}</div>
          <div class="meta">
            <span class="level-tag">${levelShort}</span>
            <span class="rank-tag">${c.prov}</span>
          </div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

  // 艺术类·仅文化课分（艺术类文化线普遍 300-450，映射到艺术生文化课位次）
  const artCultureMap = [
    [520, 100],[500, 400],[480, 1200],[460, 3000],[440, 6500],
    [420, 12000],[400, 20000],[380, 32000],[360, 48000],[340, 68000],
    [320, 92000],[300, 125000],[280, 165000]
  ];
  let map;
  if (subject === 'arts') map = artsMap;
  else if (subject === 'art_ms') map = artMsMap;
  else if (subject === 'art_music') map = artMusicMap;
  else if (subject === 'art_bd') map = artBdMap;
  else if (subject === 'art_culture') map = artCultureMap;
  else map = scienceMap;
  if (score >= map[0][0]) return map[0][1];
  for (let i = 0; i < map.length - 1; i++) {
    if (score <= map[i][0] && score >= map[i+1][0]) {
      const [s1, r1] = map[i], [s2, r2] = map[i+1];
      const ratio = (s1 - score) / (s1 - s2);
      return Math.round(r1 + (r2 - r1) * ratio);
    }
  }
  return map[map.length-1][1] * 2;
}

// ============ 判断院校是否为艺术类相关 ============
function isArtCollege(c) {
  // 校名含艺术类关键词（美院、音乐学院、传媒、戏剧、电影等）
  if (/艺术|美术|音乐|戏剧|电影|传媒|设计|舞蹈|工艺美术|服装|视觉|印刷|表演|导演|广播/.test(c.name)) return true;
  // level 含"艺术"（如"艺术学院/顶级"、"双非公办/特色"含艺术）
  if (/艺术/.test(c.level)) return true;
  // majorLib 含艺术相关关键词
  return c.majorLib.some(m => /美术|设计|音乐|舞蹈|表演|导演|摄影|视觉|数字媒体|动画|工艺|书法|戏剧|广播电视编导|播音|服装/.test(m));
}

// ============ 冲/稳/保 分层筛选 ============
function recommendByRank(userRank, prefProv, subject) {
  const isArtMode = subject && subject.indexOf('art_') === 0;
  const groups = { chong: [], wen: [], bao: [] };
  collegeDB.forEach(c => {
    if (prefProv && c.prov !== prefProv) return;
    if (isArtMode && !isArtCollege(c)) return;
    const rank = collegeRankMap[c.name];
    if (!rank) return;
    const ratio = rank / userRank;
    // 冲：院校位次比用户高（rank小）15%~65%
    if (ratio >= 0.35 && ratio < 0.85) groups.chong.push({...c, rank});
    // 稳：接近用户位次 ±20%
    else if (ratio >= 0.85 && ratio <= 1.20) groups.wen.push({...c, rank});
    // 保：院校位次比用户低（rank大）20%~250%
    else if (ratio > 1.20 && ratio <= 3.5) groups.bao.push({...c, rank});
  });
  Object.keys(groups).forEach(k => {
    groups[k].sort((a,b) => a.rank - b.rank);
    groups[k] = groups[k].slice(0, isArtMode ? 12 : 10);
  });
  return groups;
}

// ============ 分数推荐面板初始化 ============
(function initScorePanel() {
  const modeSel = document.getElementById('score-mode');
  const rowScore = document.getElementById('row-score');
  const rowRank = document.getElementById('row-rank');
  const provSel = document.getElementById('pref-prov');
  const resultEl = document.getElementById('recommend-result');

  // 填充省份下拉
  [...new Set(collegeDB.map(c => c.prov))].forEach(p => {
    const opt = document.createElement('option');
    opt.value = p; opt.textContent = p;
    provSel.appendChild(opt);

  modeSel.addEventListener('change', () => {
    if (modeSel.value === 'score') {
      rowScore.style.display = 'flex';
      rowRank.style.display = 'none';
    } else {
      rowScore.style.display = 'none';
      rowRank.style.display = 'flex';
    }
  });

  function renderGroup(cls, icon, title, desc, list) {
    if (list.length === 0) {
      return `<div class="recommend-group ${cls}">
        <div class="recommend-group-header">
          <div class="recommend-group-title">${icon} ${title}</div>
          <div class="recommend-group-desc">${desc}</div>
        </div>
        <div class="empty" style="padding:10px 0;">该档暂无匹配院校（可调整省份筛选或位次）</div>
      </div>`;
    }
    return `<div class="recommend-group ${cls}">
      <div class="recommend-group-header">
        <div class="recommend-group-title">${icon} ${title} <span style="font-size:13px;font-weight:400;color:#999;margin-left:4px;">${list.length} 所</span></div>
        <div class="recommend-group-desc">${desc}</div>
      </div>
      <div class="recommend-grid">
        ${list.map(c => {
          const levelBits = [];
          if (c.level.indexOf("C9") !== -1) levelBits.push("C9");
          if (c.level.indexOf("985") !== -1) levelBits.push("985");
          if (c.level.indexOf("211") !== -1) levelBits.push("211");
          if (levelBits.length === 0) levelBits.push("本科");
          return `<div class="recommend-card" data-name="${c.name}">
            <div class="rc-name">${c.name}</div>
            <div class="rc-meta">${c.prov} · ${levelBits.join('/')} · 参考位次 ${c.rank.toLocaleString()}</div>
            <div class="rc-tags">${c.majorLib.slice(0,3).map(m => `<span class="rc-tag">${m}</span>`).join('')}</div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }

  document.getElementById('btn-recommend').addEventListener('click', () => {
    let userRank;
    let modeText;
    let subject = null;
    if (modeSel.value === 'score') {
      const score = parseInt(document.getElementById('score-input').value);
      subject = document.getElementById('score-subject').value;
      // 分数区间校验：艺术类允许更低分（含仅文化课）
      const isArt = subject.indexOf('art_') === 0;
      const minScore = subject === 'art_culture' ? 200 : (isArt ? 300 : 300);
      const maxScore = 750;
      if (!score || score < minScore || score > maxScore) {
        resultEl.innerHTML = `<div class="empty" style="padding:20px;">⚠️ 请输入 ${minScore}-${maxScore} 之间的合理分数</div>`;
        return;
      }
      userRank = scoreToRank(score, subject);
      const subjectLabel = {
        science: '理科/物理组',
        arts: '文科/历史组',
        art_ms: '艺术类·美术（综合分）',
        art_music: '艺术类·音乐（综合分）',
        art_bd: '艺术类·编导/播音（综合分）',
        art_culture: '艺术类·仅文化课分'
      }[subject] || subject;
      const rankLabel = isArt ? '估算艺术生位次' : '估算全省位次';
      modeText = `分数 <b>${score}</b>（${subjectLabel}）→ ${rankLabel} <b>${userRank.toLocaleString()}</b>`;
    } else {
      userRank = parseInt(document.getElementById('rank-input').value);
      if (!userRank || userRank < 1) {
        resultEl.innerHTML = '<div class="empty" style="padding:20px;">⚠️ 请输入有效的位次</div>';
        return;
      }
      modeText = `全省位次 <b>${userRank.toLocaleString()}</b>`;
    }
    const prov = provSel.value;
    const provText = prov ? `｜筛选省份：<b>${prov}</b>` : '｜范围：全国';
    const artText = (subject && subject.indexOf('art_') === 0) ? `｜<b style="color:#ba68c8;">🎨 艺术类模式（仅展示艺术院校/艺术专业强校）</b>` : '';
    const groups = recommendByRank(userRank, prov, subject);

    resultEl.innerHTML = `
      <div style="padding:12px 4px 8px;font-size:14px;color:#555;">📍 ${modeText}${provText}${artText}</div>
      ${renderGroup('chong','🚀','冲一冲','建议冲刺，有一定挑战但可争取', groups.chong)}
      ${renderGroup('wen','✅','稳一稳','录取概率较高，主力志愿区间', groups.wen)}
      ${renderGroup('bao','🛡️','保一保','录取概率大，作为兜底保障', groups.bao)}
    `;
  });

  // 事件委托：点击推荐卡片弹出院校详情
  resultEl.addEventListener('click', (e) => {
    const card = e.target.closest('.recommend-card');
    if (card && card.dataset.name) showCollegeDetail(card.dataset.name);
  });
})();

// ============ 位次 → 分数反推（分段线性插值）============
function rankToScore(rank, subject) {
  const scienceMap = [
    [710, 20],[700, 100],[690, 300],[680, 600],[670, 1200],
    [660, 2000],[650, 3200],[640, 5000],[630, 7500],[620, 11000],
    [610, 16000],[600, 22000],[590, 30000],[580, 40000],[570, 52000],
    [560, 67000],[550, 85000],[540, 105000],[520, 155000],[500, 220000],
    [480, 300000],[450, 420000]
  ];
  const artsMap = [
    [680, 30],[670, 100],[660, 300],[650, 700],[640, 1500],
    [630, 2800],[620, 4500],[610, 7000],[600, 10500],[590, 15000],
    [580, 21000],[570, 28000],[560, 37000],[550, 48000],[540, 60000],
    [520, 90000],[500, 130000],[480, 180000],[450, 260000]
  ];
  const map = subject === 'arts' ? artsMap : scienceMap;
  if (rank <= map[0][1]) return map[0][0];
  for (let i = 0; i < map.length - 1; i++) {
    const [s1, r1] = map[i], [s2, r2] = map[i+1];
    if (rank >= r1 && rank <= r2) {
      const ratio = (rank - r1) / (r2 - r1);
      return Math.round(s1 + (s2 - s1) * ratio);
    }
  }
  // 超出最末档，线性外推
  const [sLast, rLast] = map[map.length-1];
  const [sPrev, rPrev] = map[map.length-2];
  const slope = (sLast - sPrev) / (rLast - rPrev);
  return Math.max(400, Math.round(sLast + slope * (rank - rLast)));
}

// ============ 某院校的强势专业（反向遍历 majorKeywords）============
function getStrongMajorsForCollege(collegeName) {
  const college = collegeDB.find(c => c.name === collegeName);
  if (!college) return [];
  const results = [];
  Object.keys(majorKeywords).forEach(majorName => {
    const keywords = majorKeywords[majorName];
    let score = 0;
    let hasPeakHit = false;
    college.majorLib.forEach(lib => {
      keywords.forEach(kw => {
        if (lib.indexOf(kw) !== -1) {
          const isPeak = /顶尖|A\+|王牌|最全/.test(lib);
          score += isPeak ? 4 : 1;
          if (isPeak) hasPeakHit = true;
        }
      });
    });
    if (score > 0) {
      results.push({ major: majorName, score, peak: hasPeakHit });
    }
  });
  results.sort((a, b) => b.score - a.score);
  return results;
}

// ============ 院校详情弹层 ============
function showCollegeDetail(collegeName) {
  const c = collegeDB.find(x => x.name === collegeName);
  if (!c) return;
  const rank = collegeRankMap[collegeName];
  const scienceScore = rank ? rankToScore(rank, 'science') : null;
  const artsScore = rank ? rankToScore(rank, 'arts') : null;
  const strongMajors = getStrongMajorsForCollege(collegeName);

  const levelShort = c.level.indexOf("C9") !== -1 ? "C9·985·211"
    : c.level.indexOf("985") !== -1 ? "985·211"
    : c.level.indexOf("211") !== -1 ? "211"
    : "本科";

  // 层次说明
  const levelDesc = c.level.indexOf("C9") !== -1
    ? "九校联盟（C9）成员，国内顶尖研究型大学"
    : c.level.indexOf("985") !== -1
    ? "985 工程 & 211 工程双料入选，国家重点建设高校"
    : c.level.indexOf("211") !== -1
    ? "211 工程入选高校，国家重点建设的百所高等学校之一"
    : "普通本科院校";

  // 强势专业渲染（Top15）
  let strongHTML = '';
  if (strongMajors.length === 0) {
    strongHTML = `<div class="strong-major-empty">😢 该校暂未匹配到收录的 68 个专业，可查看下方"学科方向"了解其重点领域</div>`;
  } else {
    strongHTML = `<div class="strong-major-list">
      ${strongMajors.slice(0, 15).map(m => `
        <div class="strong-major-item ${m.peak ? 'peak' : ''}" data-major="${m.major}">
          ${m.major}${m.peak ? '<span class="badge">👑 顶尖</span>' : ''}
        </div>
      `).join('')}
    </div>`;
  }

  // 最低分渲染
  let scoreHTML = '';
  if (rank && scienceScore && artsScore) {
    scoreHTML = `<div class="score-est-grid">
      <div class="score-est-card">
        <div class="label">🔬 理科/物理组</div>
        <div class="value">${scienceScore}<span class="suffix">分</span></div>
        <div class="rank-info">对应全省位次约 ${rank.toLocaleString()}</div>
      </div>
      <div class="score-est-card arts">
        <div class="label">📖 文科/历史组</div>
        <div class="value">${artsScore}<span class="suffix">分</span></div>
        <div class="rank-info">对应全省位次约 ${rank.toLocaleString()}</div>
      </div>
    </div>`;
  } else {
    scoreHTML = `<div class="strong-major-empty">暂无位次数据</div>`;
  }

  const dialog = document.getElementById('college-modal-dialog');
  dialog.innerHTML = `
    <div class="modal-header">
      <div>
        <h2>${c.name}</h2>
        <div class="sub">
          📍 ${c.prov}
          <span class="level-badge">${levelShort}</span>
        </div>
        <div class="sub" style="margin-top:6px;font-size:12px;color:#95a5a6;">${levelDesc}</div>
      </div>
      <button class="modal-close" onclick="closeCollegeModal()" title="关闭">×</button>
    </div>
    <div class="modal-body">
      <div class="info-block">
        <div class="info-block-title score">
          💯 最低录取分数（演示级估算）
          <span class="info-block-tip">基于全国综合位次反推，仅供参考，实际以当年各省官方分数线为准</span>
        </div>
        ${scoreHTML}
      </div>
      <div class="info-block">
        <div class="info-block-title strong">
          🏆 强势专业（Top ${Math.min(strongMajors.length, 15)}）
          <span class="info-block-tip">按学科匹配度排序，👑 顶尖 = majorLib 含"顶尖/A+/王牌/最全"字样</span>
        </div>
        ${strongHTML}
      </div>
      <div class="info-block">
        <div class="info-block-title lib">📚 学科方向（原生标签）</div>
        <div class="lib-tags">
          ${c.majorLib.map(m => `<span class="lib-tag">${m}</span>`).join('')}
        </div>
      </div>
    </div>
  `;

  // 强势专业点击 → 跳到对应专业 tab
  dialog.querySelectorAll('.strong-major-item').forEach(el => {
    el.addEventListener('click', () => {
      const majorName = el.dataset.major;
      jumpToMajor(majorName);
    });
  });

  document.getElementById('college-modal').classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeCollegeModal() {
  document.getElementById('college-modal').classList.remove('show');
  document.body.style.overflow = '';
}

// 跳转到专业 tab 并定位到指定专业
function jumpToMajor(majorName) {
  closeCollegeModal();
  // 艺术专业优先命中 art tab（部分专业如"视觉传达设计"artsMajor 也有，但艺考视角走 art 更合适）
  const isArt = typeof artMajor !== 'undefined' && artMajor[majorName];
  const isArts = artsMajor && artsMajor[majorName];
  const isScience = scienceMajor && scienceMajor[majorName];
  if (!isArt && !isArts && !isScience) return;
  const targetTab = isArt ? 'art' : (isArts ? 'arts' : 'science');
  // 切换 tab
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelector(`.tab[data-tab="${targetTab}"]`).classList.add('active');
  document.getElementById(`panel-${targetTab}`).classList.add('active');
  // 触发点击对应专业项
  setTimeout(() => {
    const listId = targetTab === 'art' ? 'art-list' : (isArts ? 'arts-list' : 'science-list');
    // 清空搜索框以确保目标项可见
    const searchId = targetTab === 'art' ? 'art-search' : (isArts ? 'arts-search' : 'science-search');
    const searchEl = document.getElementById(searchId);
    if (searchEl) { searchEl.value = ''; searchEl.dispatchEvent(new Event('input')); }
    const target = document.querySelector(`#${listId} .major-btn[data-name="${majorName}"]`);
    if (target) {
      target.click();
      target.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  }, 100);
}

// ESC 关闭弹层
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeCollegeModal();
});
</script>
